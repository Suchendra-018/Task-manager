<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
<div class="center">
    <div class="login-card">
        <h2>Task Manager</h2>
        <p class="login-subtitle">Choose an option to continue</p>
        <div class="auth-switch">
            <button type="button" class="auth-switch-btn active" data-mode="login">Login</button>
            <button type="button" class="auth-switch-btn" data-mode="signup">Sign Up</button>
        </div>
        <p class="auth-note" id="authNote">Already have an account? Use Login.</p>
        <form class="login-form" autocomplete="off">
            <input type="text" autocomplete="off" style="display:none">
            <input type="password" autocomplete="off" style="display:none">
            <input type="text" id="username" name="username" autocomplete="username" placeholder="Username" required>
            <div class="input-group">
                <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Password" required>
                <button type="button" id="togglePassword" class="eye-btn" title="Show password">👁️</button>
            </div>
            <button type="submit" id="submitButton">Login</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script>
const authButtons = document.querySelectorAll('.auth-switch-btn');
const authNote = document.getElementById('authNote');
const submitButton = document.getElementById('submitButton');
let authMode = 'login';

function showSuccess(message) {
    Toastify({
        text: message,
        duration: 3000,
        gravity: "top",
        position: "right",
        close: true,
        stopOnFocus: true,
        style: {
            background: "linear-gradient(135deg, #6C63FF, #8B5CF6)",
            borderRadius: "12px",
            fontWeight: "600"
        }
    }).showToast();
}

function showError(message) {
    Toastify({
        text: message,
        duration: 3500,
        gravity: "top",
        position: "right",
        close: true,
        stopOnFocus: true,
        style: {
            background: "linear-gradient(135deg, #ef4444, #dc2626)",
            borderRadius: "12px",
            fontWeight: "600"
        }
    }).showToast();
}

function setAuthMode(mode) {
    authMode = mode;
    authButtons.forEach(button => {
        button.classList.toggle('active', button.dataset.mode === mode);
    });
    submitButton.textContent = mode === 'login' ? 'Login' : 'Create account';
    authNote.textContent = mode === 'login'
        ? 'Already have an account? Use Login.'
        : 'New here? Create an account now.';
}

authButtons.forEach(button => {
    button.addEventListener('click', () => setAuthMode(button.dataset.mode));
});

function togglePassword() {
    const passwordInput = document.getElementById('password');
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    const toggleButton = document.getElementById('togglePassword');
    toggleButton.textContent = isPassword ? '🙈' : '👁️';
    toggleButton.title = isPassword ? 'Hide password' : 'Show password';
}

document.getElementById('togglePassword').addEventListener('click', togglePassword);

document.getElementById('togglePassword').title = 'Show password';

document.querySelector('.login-form').addEventListener('submit', submitAuthForm);

async function submitAuthForm(event) {
    event.preventDefault();

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
        showError("Please enter both username and password");
        return;
    }

    const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
    const actionText = authMode === 'login' ? 'Signing in...' : 'Creating account...';
    const originalText = submitButton.textContent;

    submitButton.textContent = actionText;
    submitButton.disabled = true;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || 'Authentication failed');
        }

        const data = await response.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', user);

        showSuccess(
    authMode === "login"
        ? `Welcome back, ${user}!`
        : `Account created successfully! Welcome, ${user}.`
);
        setTimeout(() => {
    window.location.href = "dashboard.html";
}, 1500);
    } catch (error) {
        console.error(error);
        showError(error.message || "Unable to complete the request.");
    } finally {
        submitButton.textContent = originalText;
        submitButton.disabled = false;
    }
}

window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    setAuthMode('login');
});
</script>

</body>
</html>
