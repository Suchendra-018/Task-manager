<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>

<body>

<div class="center">
    <div class="dashboard card">
        <div class="dashboard-header">
            <div>
                <h2>Welcome back, <span id="user"></span></h2>
                <p class="subtitle">Organize your day with quick tasks, filters, and MongoDB persistence.</p>
            </div>
            <button class="ghost logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="task-panel">
            <div class="task-input">
                <input type="text" id="task" placeholder="Add a new task..." onkeydown="if(event.key === 'Enter') addTask()">
                <button onclick="addTask()">Add Task</button>
            </div>

            <div class="stats-grid">

    <div class="stat-card">
        <div class="stat-title">Total Tasks</div>
        <div class="stat-value" id="totalTasks">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Active Tasks</div>
        <div class="stat-value" id="activeTasks">0</div>
    </div>

    <div class="stat-card">
        <div class="stat-title">Completed</div>
        <div class="stat-value" id="completedTasks">0</div>
    </div>

</div>
<div class="progress-section">

    <div class="progress-header">
        <span>Overall Progress</span>
        <span id="progressPercent">0%</span>
    </div>

    <div class="progress-bar">

        <div
            id="progressFill"
            class="progress-fill">
        </div>

    </div>

    <div
        class="progress-text"
        id="progressText">

        0 of 0 tasks completed

    </div>

</div>

            <div class="search-box">
    <input
        type="text"
        id="searchTask"
        placeholder="🔍 Search tasks..."
        oninput="searchTasks()">
</div>

            <div class="filters">
                <button id="filterAll" onclick="setFilter('all')">All</button>
                <button id="filterActive" onclick="setFilter('active')">Active</button>
                <button id="filterCompleted" onclick="setFilter('completed')">Completed</button>
                <button class="ghost" onclick="clearCompleted()">Clear done</button>
            </div>

            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>
</div>
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h2>Delete Task?</h2>
        <p>This action cannot be undone.</p>

        <div class="modal-buttons">
            <button id="cancelDelete" class="cancel-btn">
                Cancel
            </button>

            <button id="confirmDelete" class="delete-btn">
                Delete
            </button>
        </div>
    </div>
</div>
<div id="editModal" class="modal">

    <div class="modal-content">

        <h2>Edit Task</h2>

        <p class="modal-subtitle">
            Update your task and save the changes.
        </p>

        <input
            id="editTaskInput"
            type="text"
            placeholder="Task name">

        <div class="modal-buttons">

            <button
                id="cancelEdit"
                class="cancel-btn">
                Cancel
            </button>

            <button
                id="saveEdit"
                class="primary-btn">
                Save Changes
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/script.js"></script>
</body>
</html>
